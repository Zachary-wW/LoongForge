name: Code Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff==0.11.2"

      - name: Lint (ruff check)
        run: |
          failed=0
          ruff check loongforge/ tests/ tools/ || failed=1
          ruff format --check loongforge/ tests/ tools/ || failed=1
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "Fix: run 'ruff check --fix && ruff format'"
            exit 1
          fi
